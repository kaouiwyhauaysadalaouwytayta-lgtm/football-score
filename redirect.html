<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,follow">
    <meta http-equiv="refresh" content="5;url=https://jogosdehoje.eu.com/">
    <title>Abrindo jogosdehoje.eu.com...</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="simple-body">
    <main class="simple-panel">
        <p class="hero-kicker">Redirecionamento suave</p>
        <h1>Abrindo jogosdehoje.eu.com</h1>
        <p>Voce sera redirecionado em <span class="countdown-number" data-countdown>5</span> segundos.</p>
        <p>Se preferir, use o botao abaixo para entrar imediatamente na cobertura principal de jogos, resultados e agenda.</p>

        <div class="simple-actions">
            <a class="button button-primary" href="https://jogosdehoje.eu.com/" target="_blank" rel="noopener noreferrer">Entrar agora</a>
            <a class="button button-secondary" href="./">Voltar para a landing</a>
        </div>

        <p>&copy; <span data-year></span> jogosdehoje.</p>
    </main>

    <script>
        (function () {
            var seconds = 5;
            var counter = document.querySelector("[data-countdown]");
            var year = document.querySelector("[data-year]");

            if (year) {
                year.textContent = String(new Date().getFullYear());
            }

            var timer = window.setInterval(function () {
                seconds -= 1;
                if (counter) {
                    counter.textContent = String(Math.max(seconds, 0));
                }

                if (seconds <= 0) {
                    window.clearInterval(timer);
                    window.location.href = "https://jogosdehoje.eu.com/";
                }
            }, 1000);
        })();
    </script>
</body>
</html>
