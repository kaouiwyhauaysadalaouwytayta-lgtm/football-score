<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,follow">
    <title>Pagina nao encontrada | jogosdehoje</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #102117;
            --panel: #f5f8f2;
            --ink: #1f3429;
            --muted: #53675e;
            --brand: #18734a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: var(--white);
            background:
                radial-gradient(circle at top left, rgb(109 241 159 / 0.18), transparent 28rem),
                linear-gradient(180deg, #0d1c14 0%, var(--bg) 100%);
        }

        main {
            width: min(42rem, 100%);
            padding: clamp(1.5rem, 4vw, 2.2rem);
            border-radius: 1rem;
            background: var(--panel);
            color: var(--ink);
            box-shadow: 0 18px 40px rgb(0 0 0 / 0.18);
        }

        .kicker {
            display: inline-flex;
            padding: 0.42rem 0.85rem;
            border-radius: 999px;
            background: rgb(24 115 74 / 0.1);
            color: var(--brand);
            font-size: 0.92rem;
            font-weight: 700;
        }

        h1 {
            margin: 0.8rem 0;
            font-size: clamp(2.8rem, 8vw, 4.8rem);
            line-height: 0.95;
            letter-spacing: -0.03em;
        }

        p {
            margin: 0.7rem 0 0;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3.1rem;
            padding: 0.9rem 1.25rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }

        .button-primary {
            background: var(--brand);
            color: var(--white);
        }

        .button-secondary {
            background: rgb(16 33 23 / 0.08);
            color: var(--ink);
        }

        @media (max-width: 640px) {
            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <p class="kicker">Erro 404</p>
        <h1>Esta pagina saiu de campo</h1>
        <p>O endereco que voce tentou abrir nao existe mais neste projeto do GitHub Pages.</p>
        <p>Volte para a landing principal ou siga direto para jogosdehoje.eu.com.</p>

        <div class="actions">
            <a class="button button-primary" data-home-link href="./">Voltar para a pagina inicial</a>
            <a class="button button-secondary" href="https://jogosdehoje.eu.com/" target="_blank" rel="noopener noreferrer">Abrir o site principal</a>
        </div>

        <p>&copy; <span data-year></span> jogosdehoje.</p>
    </main>

    <script>
        (function () {
            var year = document.querySelector("[data-year]");
            var homeLink = document.querySelector("[data-home-link]");

            if (year) {
                year.textContent = String(new Date().getFullYear());
            }

            if (homeLink) {
                homeLink.setAttribute(
                    "href",
                    window.location.pathname.indexOf("/football-score/") === 0 ? "/football-score/" : "./"
                );
            }
        })();
    </script>
</body>
</html>
